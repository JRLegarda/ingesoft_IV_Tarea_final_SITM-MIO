plugins {
    id 'java'
    id 'application'
    id 'com.zeroc.gradle.ice-builder.slice' version '1.5.0'
    id 'com.github.johnrengelman.shadow' version '8.1.1'
}

group = 'org.example'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.zeroc:ice:3.7.10'
}

java {
    sourceCompatibility = JavaVersion.VERSION_17
    targetCompatibility = JavaVersion.VERSION_17
}

application {
    mainClass = 'Demo.MasterNode'
}

slice {
    java {
        files = fileTree(dir: 'src/main/slice', include: '*.ice')
    }
}

jar {
    manifest {
        attributes(
                "Main-Class": "Demo.MasterNode"
        )
    }
}

shadowJar {
    archiveBaseName.set("master-node")
    archiveClassifier.set("")   // para que el jar final NO tenga "-all"
    archiveVersion.set("")      // para evitar "-1.0-SNAPSHOT"
    mergeServiceFiles()

    manifest {
        attributes(
                "Main-Class": "Demo.MasterNode"
        )
    }
}